<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - PREMIUM DARK</title>
    <style>
        :root { --primary: #f7941d; --dark: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --aba: #00a8ff; --success: #2ecc71; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--dark) !important; 
            color: var(--text-main) !important; 
            text-align: center; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
        }

        /* Header Dark */
        header { 
            height: 100px !important; 
            background: #000000 !important; 
            border-bottom: 1px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .logo-header { height: 70px !important; width: auto !important; }

        /* --- KODE CSS ULAR ORANGE --- */
        .snake-bar { 
            width: 100%; height: 35px; 
            background: #0a0a0a; 
            position: relative; 
            overflow: hidden; 
            border-bottom: 2px solid #222; 
            display: flex; 
            align-items: center; 
        }
        .snake-body { position: absolute; display: flex; gap: 3px; animation: snakeRun 8s linear infinite; }
        .dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; animation: snakeWave 0.8s ease-in-out infinite; }
        .head { width: 18px; height: 18px; background: #ffae00; box-shadow: 0 0 10px var(--primary); }
        
        @keyframes snakeRun { 0% { left: -200px; } 100% { left: 100%; } }
        @keyframes snakeWave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        
        /* Jeda liukan ular */
        .dot:nth-child(2) { animation-delay: 0.1s; }
        .dot:nth-child(3) { animation-delay: 0.2s; }
        .dot:nth-child(4) { animation-delay: 0.3s; }
        .dot:nth-child(5) { animation-delay: 0.4s; }

        /* Grid & Card */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { 
            background: var(--card-bg) !important; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            border: 1px solid #333; 
        }
        .card img { width: 100%; height: 140px; object-fit: cover; opacity: 0.9; }
        .card-info { padding: 10px; }
        .card-name { font-size: 0.75em; font-weight: 800; margin-bottom: 8px; height: 30px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; color: #ddd; }

        /* Counter */
        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; padding-bottom: 10px; }
        .btn-qty { background: #333; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-qty:active { background: var(--primary); }
        .qty-val { font-weight: 800; font-size: 1.1em; min-width: 20px; color: var(--primary); }

        /* Floating Bar */
        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #1a1a1a; color: white; 
            padding: 18px 25px; display: none; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; 
            border-top: 2px solid var(--primary);
            border-radius: 20px 20px 0 0; 
        }
        .total-price { font-weight: 900; font-size: 1.3em; color: var(--primary); }
        .btn-order { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Payment Area */
        #payment-area { display:none; padding: 40px 20px; background: #1e1e1e !important; border-top: 2px solid #333; margin-top: 30px; }
        .input-nama { width: 80%; padding: 15px; border-radius: 10px; border: 2px solid #444; background: #2c2c2c; color: white; margin-bottom: 20px; font-size: 1em; text-align: center; }
        .pay-options { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .pay-btn { padding: 12px 20px; border: 2px solid var(--aba); border-radius: 10px; background: transparent; color: var(--aba); font-weight: bold; cursor: pointer; }
        .pay-btn.active { background: var(--aba); color: white; }
        .qr-box { display: none; margin-top: 20px; }
        .qr-box img { width: 260px; border: 5px solid #333; border-radius: 15px; }
        .final-btn { display: inline-block; background: var(--success); color: white; padding: 18px 40px; border: none; border-radius: 50px; font-weight: bold; margin-top: 30px; width: 85%; cursor: pointer; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <a href="#" style="display: flex; align-items: center; text-decoration: none; gap: 20px;">
            <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header" alt="Logo">
            <div style="text-align: left;">
                <h2 style="margin:0; font-size: 1.2em; color: white;">TERSNACKS</h2>
                <p style="margin:0; font-size:0.6em; color:var(--primary); font-weight:bold;">PREMIUM QUALITY • $2.50</p>
            </div>
        </a>
    </header>

    <div class="snake-bar">
        <div class="snake-body">
            <div class="dot head"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot" style="width:6px; height:6px; margin-top:5px;"></div>
        </div>
    </div>

    <div class="grid" id="container-snack"></div>

    <div id="total-bar">
        <div class="total-info" style="text-align:left;">
            <div id="summary" style="font-size: 0.7em; opacity: 0.6; margin-bottom: 2px;">Pilih snack...</div>
            <div class="total-price" id="display-total">$0.00</div>
        </div>
        <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
    </div>

    <div id="payment-area">
        <h3 style="color: var(--primary);">DATA PEMBELI</h3>
        <input type="text" id="nama-pembeli" class="input-nama" placeholder="Masukkan Nama Anda..." required>
        
        <h3 style="color: var(--primary);">PILIH PEMBAYARAN ABA</h3>
        <div class="pay-options">
            <button class="pay-btn" onclick="showQR('usd', this)">USD ($)</button>
            <button class="pay-btn" onclick="showQR('riel', this)">RIEL (៛)</button>
        </div>

        <div id="qr-usd" class="qr-box">
            <p>Scan ABA (USD):</p>
            <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg">
        </div>

        <div id="qr-riel" class="qr-box">
            <p>Scan ABA (RIEL):</p>
            <img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg">
        </div>

        <p style="margin-top:20px; font-size:0.85em; opacity:0.8; font-weight:bold; color: #aaa;">Sudah bayar? Klik konfirmasi!</p>
        <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
    </div>

    <audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

    <script>
        const snackData = [
            { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 3, name: "MIE LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = {};

        function init() {
            const grid = document.getElementById('container-snack');
            snackData.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.img}">
                        <div class="card-info">
                            <div class="card-name">${s.name}</div>
                            <div class="counter">
                                <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                                <span class="qty-val" id="qty-${s.id}">0</span>
                                <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0; let list = [];
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    total += cart[id] * 2.5;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });
            const bar = document.getElementById('total-bar');
            if(total > 0) {
                bar.style.display = 'flex';
                document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('summary').innerText = list.join(", ");
            } else { bar.style.display = 'none'; }
        }

        function openPayment() {
            document.getElementById('bgMusic').play();
            const pay = document.getElementById('payment-area');
            pay.style.display = 'block';
            pay.scrollIntoView({ behavior: 'smooth' });
        }

        function showQR(type, btn) {
            document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
            document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToSpreadsheet() {
            const nama = document.getElementById('nama-pembeli').value;
            if(!nama) { alert("Nama jangan kosong dong, Bos!"); return; }
            let list = []; let totalUSD = 0;
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    totalUSD += cart[id] * 2.5;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });
            const btn = document.getElementById('submit-btn');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;
            const scriptURL = "https://script.google.com/macros/s/AKfycby-koR4z1YFZYSs3XPAkrGMdpBcN7tqx_1i1JAf4W5vo9Ka-0w8NjYrMFXHIytVZ6FY/exec";
            const params = new URLSearchParams();
            params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
            params.append('total', "$" + totalUSD.toFixed(2));
            fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
            .then(() => {
                alert(`MANTAP ${nama}! Pesanan sudah masuk.`);
                location.reload();
            })
            .catch(() => {
                alert("Berhasil Terkirim!");
                location.reload();
            });
        }
        init();
    </script>
</body>
</html>
