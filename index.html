<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID</title>
    <style>
        /* Variabel Permanen Gelap */
        :root { 
            --primary: #f7941d; 
            --dark: #1a1a1a; 
            --aba: #005a8d; 
            --success: #27ae60; 
            --bg-body: #121212; 
            --bg-card: #1e1e1e; 
            --text-color: #f1f1f1; 
            --border-color: #333; 
            --header-bg: #1a1a1a; 
            --payment-bg: #1e1b10; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg-body); 
            color: var(--text-color); 
            text-align: center; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
        }
        
        header { padding: 30px 20px; background: var(--header-bg); border-bottom: 1px solid var(--border-color); position: relative; z-index: 10; }
        
        /* LOGO KEMBALI KE 60PX SESUAI KODE ASLI BOS */
        .logo-box { width: 60px; height: 60px; border: 3px solid var(--primary); border-radius: 15px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; color: var(--primary); }

        /* Efek Premium Mengkilap */
        .premium-text {
            font-size: 1.5em;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            background: linear-gradient(110deg, #f7941d 20%, #000 45%, #fff 50%, #000 55%, #f7941d 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .slogan-italic {
            margin: 5px 0 0;
            font-size: 1.0em;
            color: var(--primary);
            font-weight: bold;
            font-style: italic;
        }

        /* Struktur Grid & Card */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border-color); }
        .card img { width: 100%; height: 140px; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 10px; }
        .card-name { font-size: 0.7em; font-weight: 800; height: 30px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; padding-bottom: 10px; }
        .btn-qty { background: #333; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .qty-val { font-weight: 800; color: var(--primary); min-width: 20px; }

        #total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; color: white; padding: 15px 20px; display: none; justify-content: space-between; align-items: center; z-index: 1000; border-radius: 20px 20px 0 0; border-top: 1px solid var(--border-color); }
        .btn-order { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #payment-area { display:none; padding: 40px 20px; background: var(--payment-bg); margin-top: 30px; }
        .input-nama { width: 80%; padding: 15px; border-radius: 10px; border: 2px solid var(--primary); background: #222; color: white; text-align: center; font-weight: bold; }
        
        .pay-options { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .pay-btn { padding: 12px 20px; border: 2px solid var(--aba); border-radius: 10px; background: #222; color: #5dade2; font-weight: bold; }
        .pay-btn.active { background: var(--aba); color: white; }
        .qr-box { margin-top: 20px; display: none; }
        .qr-box img { width: 260px; border: 8px solid white; border-radius: 15px; }

        .final-btn { display: inline-block; background: var(--success); color: white; padding: 18px 40px; border: none; border-radius: 50px; font-weight: bold; margin-top: 30px; width: 85%; cursor: pointer; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <div class="logo-box">T</div>
    <div class="header-text">
        <div class="premium-text">PREMIUM QUALITY</div>
        <p class="slogan-italic">"Temanin suntukmu dikala jari mengetik"</p>
    </div>
</header>

<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div class="total-info" style="text-align:left;">
        <div id="summary" style="font-size: 0.65em; opacity: 0.7;">Pilih snack...</div>
        <div class="total-price" id="display-total" style="font-weight:900; color:var(--primary); font-size:1.2em;">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
</div>

<div id="payment-area">
    <h3 style="color: var(--primary);">DATA PEMBELI</h3>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="Masukkan Nama Anda..." required>
    
    <h3 style="color: var(--primary);">PILIH PEMBAYARAN ABA</h3>
    <div class="pay-options">
        <button class="pay-btn" onclick="showQR('usd', this)">USD ($)</button>
        <button class="pay-btn" onclick="showQR('riel', this)">RIEL (៛)</button>
    </div>

    <div id="qr-usd" class="qr-box"><img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg"></div>
    <div id="qr-riel" class="qr-box"><img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg"></div>

    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
</div>

<audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

<script>
    const snackData = [
        { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
        { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    function init() {
        const grid = document.getElementById('container-snack');
        snackData.forEach(s => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${s.img}">
                    <div class="card-info">
                        <div class="card-name">${s.name}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                            <span class="qty-val" id="qty-${s.id}">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        cart[id] = (cart[id] || 0) + delta;
        if(cart[id] < 0) cart[id] = 0;
        document.getElementById(`qty-${id}`).innerText = cart[id];
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => {
            if(cart[id] > 0) {
                total += cart[id] * 2.5;
                list.push(`${cart[id]}x ${snackData[id].name}`);
            }
        });
        const bar = document.getElementById('total-bar');
        if(total > 0) {
            bar.style.display = 'flex';
            document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('summary').innerText = list.join(", ");
        } else { bar.style.display = 'none'; }
    }

    function openPayment() {
        document.getElementById('bgMusic').play();
        const pay = document.getElementById('payment-area');
        pay.style.display = 'block';
        pay.scrollIntoView({ behavior: 'smooth' });
    }

    function showQR(type, btn) {
        document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
        document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) { alert("Nama jangan kosong!"); return; }
        let list = []; let totalUSD = 0;
        Object.keys(cart).forEach(id => {
            if(cart[id] > 0) {
                totalUSD += cart[id] * 2.5;
                list.push(`${cart[id]}x ${snackData[id].name}`);
            }
        });
        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; btn.disabled = true;
        const scriptURL = "https://script.google.com/macros/s/AKfycby-koR4z1YFZYSs3XPAkrGMdpBcN7tqx_1i1JAf4W5vo9Ka-0w8NjYrMFXHIytVZ6FY/exec";
        const params = new URLSearchParams();
        params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
        params.append('total', "$" + totalUSD.toFixed(2));
        fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
        .then(() => { alert(`MANTAP ${nama}!`); location.reload(); })
        .catch(() => { alert("Terkirim!"); location.reload(); });
    }
    init();
</script>
</body>
</html>
