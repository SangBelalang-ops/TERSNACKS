<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PITERSNACKS - Order Mudah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f7941d; --price: #e74c3c; --dark: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f8f8f8; padding-top: 70px; }
        
        header { background: white; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; color: var(--primary); font-size: 20px; }
        .cart-toggle { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .hero { background: white; padding: 30px 15px; text-align: center; border-bottom: 2px solid #eee; }
        .hero h1 { font-size: 28px; margin-bottom: 5px; }
        .hero p { color: #666; font-size: 14px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.05); text-align: center; padding-bottom: 15px; }
        .img { height: 180px; background-size: cover; background-position: center; margin-bottom: 10px; }
        .name { font-size: 14px; font-weight: 600; height: 40px; padding: 0 5px; }
        .price { color: var(--price); font-weight: 800; margin: 5px 0; display: block; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 15px; cursor: pointer; font-size: 12px; }

        .sidebar { position: fixed; right: -100%; top: 0; width: 100%; max-width: 350px; height: 100%; background: white; z-index: 200; transition: 0.3s; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .items { flex: 1; overflow-y: auto; margin: 20px 0; }
        .item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .total { font-weight: 800; font-size: 18px; border-top: 2px solid #eee; padding-top: 10px; }
        .btn-checkout { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: 800; margin-top: 15px; cursor: pointer; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">PITERSNACKS</div>
        <div class="cart-toggle" onclick="toggle()">🛒 <span id="count">0</span></div>
    </header>

    <section class="hero">
        <h1>Menu Premium</h1>
        <p>Flat Price: $2.5 (10,000 Riel)</p>
    </section>

    <div class="grid" id="grid"></div>

    <div class="sidebar" id="sidebar">
        <h2 onclick="toggle()" style="cursor:pointer">← Kembali</h2>
        <div class="items" id="items"></div>
        <div class="total">
            Total: <span id="usd">$0</span><br>
            <small id="riel" style="color:#666">0 Riel</small>
        </div>
        <button class="btn-checkout" onclick="checkout()">Kirim Pesanan</button>
    </div>

    <script>
        const products = [
            { id: 1, n: "Kacang Tojin", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 2, n: "Ketawa", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 3, n: "Kacang Ting Ting", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 4, n: "Mie Lidi", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 5, n: "Makaroni", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 6, n: "Basreng", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 7, n: "Lumpia", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 8, n: "Kacang Arab", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 9, n: "Kacang Madu", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = [];

        function init() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="card">
                    <div class="img" style="background-image:url('${p.img}')"></div>
                    <div class="name">${p.n}</div>
                    <span class="price">$2.5</span>
                    <button class="btn-add" onclick="add(${p.id})">+ Keranjang</button>
                </div>
            `).join('');
        }

        function add(id) {
            cart.push(products.find(p => p.id === id));
            update();
        }

        function update() {
            document.getElementById('count').innerText = cart.length;
            document.getElementById('items').innerHTML = cart.map((it, i) => `
                <div class="item"><span>${it.n}</span> <span>$2.5 <b onclick="del(${i})" style="color:red;cursor:pointer">X</b></span></div>
            `).join('');
            const total = cart.length * 2.5;
            document.getElementById('usd').innerText = `$${total.toFixed(2)}`;
            document.getElementById('riel').innerText = `${(total * 4000).toLocaleString()} Riel`;
        }

        function del(i) { cart.splice(i, 1); update(); }
        function toggle() { document.getElementById('sidebar').classList.toggle('active'); }

        function checkout() {
            if(cart.length === 0) return alert("Pilih snack dulu bos!");
            const list = cart.map(it => it.n).join(", ");
            const total = document.getElementById('usd').innerText + " (" + document.getElementById('riel').innerText + ")";
            
            const textToCopy = "Daftar Pesanan: " + list + " | Total Bayar: " + total;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Detail pesanan BERHASIL DISALIN!\n\nSilakan isi Nama dan tinggal PASTE di kolom 'Pesanan' pada form yang akan terbuka.");
                window.open("https://docs.google.com/forms/d/1b4YLtNZ-Pk8feMkONE_OeI2fjYgCbR5acGsywUn-WFU/viewform", "_blank");
            });
        }

        init();
    </script>
</body>
</html>
