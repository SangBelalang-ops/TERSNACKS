<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID </title>
    <style>
        :root { 
            --primary: #f7941d; /* Tetap oranye buat aksen */
            --bg-body: #121212; /* Hitam Dove Background */
            --bg-card: rgba(255, 255, 255, 0.05); /* Putih transparan tipis */
            --glass: blur(10px) saturate(180%); /* Efek Glassmorphism */
            --border: rgba(255, 255, 255, 0.1); /* Border transparan */
            --text-main: #e0e0e0; /* Teks abu terang biar gak sakit mata */
            --aba: #007bbd; /* Biru ABA disesuain dikit biar masuk tema gelap */
            --success: #2ecc71; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg-body); 
            color: var(--text-main); 
            text-align: center; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
        }
        
        /* Efek Hujan Makaroni - Dibikin agak redup biar gak ganggu mata */
        .macaroni {
            position: fixed; top: -50px; font-size: 24px; z-index: 9999;
            pointer-events: none; animation: fall linear forwards;
            opacity: 0.5;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        header { 
            padding: 20px; 
            background: rgba(18, 18, 18, 0.8); /* Hitam transparan */
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; 
        }
        
        .logo-header {
            max-height: 50px; /* Biar gak ketinggian di mobile */
            margin-bottom: 5px;
        }
        
        .header-text h2 { color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; max-width: 800px; margin: 0 auto; }
        
        /* Card Mode Gelas Transparan */
        .card { 
            background: var(--bg-card); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            transition: 0.3s; 
        }
        .card:hover { border-color: rgba(247, 148, 29, 0.5); transform: translateY(-3px); }
        .card img { width: 100%; height: 120px; object-fit: cover; filter: brightness(0.9); }
        .card-info { padding: 10px; }
        .card-name { font-size: 0.7em; font-weight: 800; margin-bottom: 8px; height: 30px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; color: #fff; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; padding-bottom: 5px; }
        
        /* Tombol Qty Mode Gelap */
        .btn-qty { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid var(--border); 
            color: #fff;
            width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em;
            transition: 0.2s;
        }
        .btn-qty:active { background: var(--primary); border-color: var(--primary); transform: scale(0.9); }
        .qty-val { font-weight: 800; font-size: 1.1em; min-width: 25px; color: var(--primary); }

        /* Total Bar Mode Gelas di Bawah */
        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(30, 30, 30, 0.8); /* Abu gelap transparan */
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            color: white; padding: 15px 20px; 
            display: none; justify-content: space-between; align-items: center; 
            z-index: 1000; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); 
            border-radius: 20px 20px 0 0; 
            border-top: 1px solid var(--border);
        }
        .total-price { font-weight: 900; font-size: 1.4em; color: var(--primary); text-shadow: 0 0 10px rgba(247,148,29,0.3); }
        .btn-order { background: var(--primary); color: #fff; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;}
        .btn-order:hover { box-shadow: 0 0 15px rgba(247,148,29,0.5); }

        /* Payment Area Mode Gelap */
        #payment-area { 
            display:none; padding: 40px 20px; 
            background: #1a1a1a; /* Sedikit lebih terang dari body */
            border-top: 1px solid var(--border); 
            margin-top: 30px; 
        }
        #payment-area h3 { color: #fff; }

        /* Input Mode Gelap */
        .input-nama { 
            width: 80%; max-width: 400px; padding: 15px; 
            border-radius: 12px; 
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--border); 
            margin-bottom: 25px; font-size: 1em; text-align: center; font-weight: bold; color: #fff; 
            transition: 0.3s;
        }
        .input-nama:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.5); }
        
        .pay-options { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        
        /* Tombol Bayar ABA */
        .pay-btn { 
            padding: 12px 25px; 
            border: 2px solid var(--aba); 
            border-radius: 12px; 
            background: transparent; 
            color: var(--aba); font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .pay-btn.active { background: var(--aba); color: white; box-shadow: 0 0 15px rgba(0,123,189,0.4); }

        .qr-box { display: none; margin-top: 25px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        .qr-box p { color: #fff; }
        .qr-box img { width: 260px; border: 8px solid rgba(255,255,255,0.05); border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }

        .final-btn { 
            display: inline-block; background: var(--success); color: white; 
            padding: 18px 40px; border: none; border-radius: 50px; 
            font-weight: bold; margin-top: 30px; width: 85%; max-width: 400px;
            cursor: pointer; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; 
        }
        .final-btn:hover { box-shadow: 0 0 20px rgba(46,204,113,0.4); }
        .final-btn:disabled { background: #555; cursor: not-allowed; }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; } 
            .card img { height: 100px; }
            .input-nama, .final-btn { width: 90%; }
        }
    </style>
</head>
<body>

   <header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header" alt="Logo TERSNACKS">
    
    <div class="header-text">
        <h2 style="margin:0; font-size: 1.2em; letter-spacing: 2px;">PREMIUM</h2>
        <p style="margin:0; font-size:0.75em; color:var(--primary); font-weight:bold;">Teman Ngunyah dikala jari mengetik</p>
    </div>
</header>

    <div class="grid" id="container-snack"></div>

    <div id="total-bar">
        <div class="total-info" style="text-align:left;">
            <div id="summary" style="font-size: 0.7em; opacity: 0.8; margin-bottom: 3px; color: #ccc; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Pilih snack...</div>
            <div class="total-price" id="display-total">$0.00</div>
        </div>
        <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
    </div>

    <div id="payment-area">
        <h3>DATA PEMBELI</h3>
        <input type="text" id="nama-pembeli" class="input-nama" placeholder="Masukkan Nama Anda..." required>
        
        <h3>PILIH PEMBAYARAN ABA</h3>
        <div class="pay-options">
            <button class="pay-btn" onclick="showQR('usd', this)">USD ($)</button>
            <button class="pay-btn" onclick="showQR('riel', this)">RIEL (៛)</button>
        </div>

        <div id="qr-usd" class="qr-box">
            <p>Scan ABA (USD):</p>
            <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg">
        </div>

        <div id="qr-riel" class="qr-box">
            <p>Scan ABA (RIEL):</p>
            <img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg">
        </div>

        <p style="margin-top:25px; font-size:0.9em; opacity:0.8; font-weight:bold; color: #eee;">Sudah bayar? Klik konfirmasi!</p>
        <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
    </div>

    <audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

    <script>
        // --- JAVASCRIPT LOGIC - TIDAK DIUBAH SAMA SEKALI ---
        const snackData = [
            { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 3, name: "KERIPIK LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = {};

        // Fungsi Hujan Makaroni
        function createMacaroni() {
            const macaroni = document.createElement('div');
            macaroni.classList.add('macaroni');
            macaroni.innerText = '🍤'; // Simbol makaroni/snack
            macaroni.style.left = Math.random() * 100 + 'vw';
            macaroni.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(macaroni);
            setTimeout(() => { macaroni.remove(); }, 5000);
        }
        setInterval(createMacaroni, 500);

        function init() {
            const grid = document.getElementById('container-snack');
            snackData.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.img}">
                        <div class="card-info">
                            <div class="card-name">${s.name}</div>
                            <div class="counter">
                                <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                                <span class="qty-val" id="qty-${s.id}">0</span>
                                <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0; let list = [];
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    total += cart[id] * 3;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });
            const bar = document.getElementById('total-bar');
            if(total > 0) {
                bar.style.display = 'flex';
                document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('summary').innerText = list.join(", ");
            } else { bar.style.display = 'none'; }
        }

        function openPayment() {
            try { document.getElementById('bgMusic').play(); } catch(e) {} // Mencegah error jika browser blokir autoplay
            const pay = document.getElementById('payment-area');
            pay.style.display = 'block';
            pay.scrollIntoView({ behavior: 'smooth' });
        }

        function showQR(type, btn) {
            document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
            document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToSpreadsheet() {
            const nama = document.getElementById('nama-pembeli').value;
            if(!nama) { alert("Nama jangan kosong dong, Bos!"); return; }

            let list = []; let totalUSD = 0;
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    totalUSD += cart[id] * 3;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });

            const btn = document.getElementById('submit-btn');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;

            const scriptURL = "https://script.google.com/macros/s/AKfycby-koR4z1YFZYSs3XPAkrGMdpBcN7tqx_1i1JAf4W5vo9Ka-0w8NjYrMFXHIytVZ6FY/exec";
            
            const params = new URLSearchParams();
            params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
            params.append('total', "$" + totalUSD.toFixed(2));

            fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
            .then(() => {
                alert(`MANTAP ${nama}! Pesanan sudah masuk ke Sheets.`);
                location.reload();
            })
            .catch(() => {
                // Karena mode no-cors, fetch sering dianggap error padahal data masuk.
                // Kita asumsikan sukses saja sesuai logic asli.
                alert("Berhasil Terkirim!");
                location.reload();
            });
        }
        init();
    </script>
</body>
</html>
