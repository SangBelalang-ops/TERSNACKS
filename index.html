<script>
    // Link Exec lo yang baru (Sudah gue update)
    const scriptURL = "https://script.google.com/macros/s/AKfycbzTbO6i-_AraS9GOFYntW63hRyB-0aP36l0PCp9EdnZvfiXciHGZQo3CMnc_uf0P3A2/exec";

    // EFEK HUJAN KHAS SONGKRAN
    function createSnack() {
        const icons = ['🔫', '💦', '💧', '🌊', '🥨', '🍪'];
        const spray = document.createElement('div');
        spray.className = 'falling-snack';
        spray.innerText = icons[Math.floor(Math.random() * icons.length)];
        spray.style.left = Math.random() * 100 + 'vw';
        spray.style.animationDuration = Math.random() * 2 + 1.2 + 's';
        document.body.appendChild(spray);
        setTimeout(() => spray.remove(), 3000);
    }
    setInterval(createSnack, 150);

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    // FUNGSI INIT YANG SUDAH DI-UPGRADE (ANTI 0)
    async function init() {
        const loading = document.getElementById('loading');
        // Pake Proxy biar nembus blokir browser
        const proxyURL = "https://api.allorigins.win/get?url=" + encodeURIComponent(scriptURL);

        try {
            const response = await fetch(proxyURL);
            const data = await response.json();
            
            // AllOrigins membungkus datanya di dalam 'contents'
            const sheetStok = JSON.parse(data.contents);
            
            console.log("DATA BERHASIL TEMBUS:", sheetStok);

            snackData.forEach(s => { 
                if(sheetStok[s.name] !== undefined) {
                    s.stock = parseInt(sheetStok[s.name]); 
                }
            });
            
            loading.style.display = 'none';
            render();
        } catch(e) { 
            console.error("Masih error nyedot data:", e);
            loading.innerHTML = "Koneksi Google Lemot, mencoba manual...";
            setTimeout(() => {
                loading.style.display = 'none';
                render();
            }, 2000);
        }
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const empty = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${empty ? 'is-empty' : ''}">
                    <div class="sold-out-overlay"><div class="sold-out-text">SOLD OUT</div></div>
                    <img src="${s.img}">
                    <div class="card-info">
                        <div class="card-name">${s.name}</div>
                        <div class="stock-tag">SISA: ${s.stock}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${empty ? 'disabled' : ''}>-</button>
                            <span id="qty-${s.id}" style="font-weight:900; min-width:20px;">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id},1)" ${empty ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = cart[id] || 0;
        if(delta > 0 && q >= snackData[id].stock) return;
        q += delta; if(q < 0) q = 0;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => { 
            if(cart[id]>0){ total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }
        });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('summary').innerText = list.join(", ");
    }

    function openPayment() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    function showQR(t) { 
        document.getElementById('qr-usd').style.display = t=='usd'?'block':'none'; 
        document.getElementById('qr-riel').style.display = t=='riel'?'block':'none'; 
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("MASUKKAN NAMA BOSKU!");
        
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { if(cart[id]>0){ total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }});
        
        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; btn.disabled = true;

        const params = new URLSearchParams();
        params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
        params.append('total', "$" + total.toFixed(2));

        fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
        .then(() => { alert("PESANAN TERKIRIM!"); location.reload(); });
    }

    init();
</script>
