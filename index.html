<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - PREMIUM QUALITY</title>
    <style>
        :root { 
            --primary: #00d4ff; 
            --glass: rgba(10, 25, 41, 0.9); 
            --success: #00f2ff; 
            --danger: #ff4d4d; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #000; 
            color: white; 
            text-align: center; 
            padding-bottom: 80px; 
            overflow-x: hidden; 
        }
        
        /* Animasi Efek Air (Dibuat lebih ringan biar gak lag) */
        .falling-snack {
            position: fixed; top: -50px; font-size: 24px; z-index: 100;
            user-select: none; pointer-events: none; animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        header { 
            position: relative; z-index: 10; padding: 40px 10px; 
            background: var(--glass); border-bottom: 2px solid var(--primary); 
            backdrop-filter: blur(10px);
        }
        .logo-header { width: 260px; filter: drop-shadow(0 0 15px var(--primary)); margin-bottom: 10px; }
        
        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; padding: 20px; max-width: 1100px; margin: 0 auto; 
        }
        .card { 
            background: var(--glass); border-radius: 18px; overflow: hidden; 
            border: 1px solid rgba(0, 212, 255, 0.2); position: relative; 
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        
        /* Sold Out Style */
        .sold-out-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 140px; 
            background: rgba(0,0,0,0.8); display: none; align-items: center; 
            justify-content: center; z-index: 5; 
        }
        .sold-out-text { 
            color: white; background: var(--danger); padding: 5px 12px; 
            font-weight: 900; transform: rotate(-15deg); border: 2px solid white; font-size: 0.8em; 
        }
        .is-empty .sold-out-overlay { display: flex; }
        .is-empty img { filter: grayscale(1); }

        .card-info { padding: 12px; }
        .card-name { 
            font-size: 0.8em; font-weight: 800; color: var(--primary); 
            height: 40px; display: flex; align-items: center; justify-content: center; 
            text-transform: uppercase; line-height: 1.2;
        }
        
        .stock-tag { 
            font-size: 0.65em; color: var(--primary); background: rgba(0, 212, 255, 0.1);
            border-radius: 6px; padding: 3px 10px; display: inline-block; margin-bottom: 12px;
            font-weight: 900; border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .counter { display: flex; justify-content: center; align-items: center; gap: 12px; }
        .btn-qty { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--primary); 
            width: 35px; height: 35px; border-radius: 10px; color: white; 
            cursor: pointer; font-weight: bold; font-size: 1.2em;
        }
        .btn-qty:active { background: var(--primary); color: black; }

        /* Floating Bar Total */
        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--glass); padding: 20px 30px; 
            display: none; justify-content: space-between; align-items: center; 
            border-top: 2px solid var(--primary); border-radius: 25px 25px 0 0; 
            z-index: 1000; backdrop-filter: blur(15px); 
        }
        .btn-order { 
            background: var(--primary); color: black; border: none; 
            padding: 14px 28px; border-radius: 14px; font-weight: 900; 
            cursor: pointer; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); 
        }

        /* Area Pembayaran */
        #payment-area { 
            position: relative; z-index: 10; display:none; 
            padding: 40px 20px; background: rgba(0,0,0,0.98); 
            border-top: 2px solid var(--primary); 
        }
        .input-nama { 
            width: 85%; padding: 16px; border-radius: 15px; 
            border: 1px solid var(--primary); background: transparent; 
            color: white; margin-bottom: 25px; text-align: center; 
            font-weight: 800; font-size: 1.1em; 
        }
        .final-btn { 
            background: var(--success); color: black; padding: 20px; 
            border: none; border-radius: 50px; font-weight: 900; 
            width: 90%; cursor: pointer; font-size: 1.2em; 
        }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <h2 style="margin:0; font-size: 1.5em; font-weight: 900; letter-spacing: 1px;">TERSNACKS.ID</h2>
    <p style="margin:5px 0 0; font-size:0.8em; letter-spacing:2px; color:var(--primary);">PREMIUM QUALITY • $3.00</p>
</header>

<div id="loading" style="padding: 100px 20px; color: var(--primary); font-weight: 800;">
    SYNCING STOCK...
</div>

<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div style="text-align:left">
        <div id="summary" style="font-size: 0.7em; color: #ccc; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        <div id="display-total" style="font-weight: 900; color: var(--primary); font-size: 1.6em;">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">BELI SEKARANG</button>
</div>

<div id="payment-area">
    <h2 style="color: var(--primary); font-weight: 900;">CHECKOUT</h2>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="MASUKKAN NAMA ANDA">
    
    <div style="margin-bottom: 30px;">
        <p style="font-size: 0.9em; color: #888;">PEMBAYARAN VIA ABA:</p>
        <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg" style="width: 250px; border-radius: 15px; border: 4px solid white;">
    </div>

    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
</div>

<script>
    // 1. GANTI LINK EXEC LO DI SINI
    const scriptURL = "https://script.google.com/macros/s/AKfycbymsawZK3cr8cD8kyfxQQoML_GBjUO0EEBWvOnAAtiRsGQH4OL6rRElSwW7Al1bHMy6/exec";

    // Efek Air (Dioptimalkan agar tidak lag)
    function createSnack() {
        if (document.hidden) return; 
        const icons = ['💧', '💦']; 
        const spray = document.createElement('div');
        spray.className = 'falling-snack';
        spray.innerText = icons[Math.floor(Math.random() * icons.length)];
        spray.style.left = Math.random() * 100 + 'vw';
        spray.style.opacity = Math.random();
        spray.style.animationDuration = Math.random() * 2 + 2 + 's';
        document.body.appendChild(spray);
        setTimeout(() => spray.remove(), 4000);
    }
    setInterval(createSnack, 300);

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    function init() {
        const script = document.createElement('script');
        script.src = `${scriptURL}?callback=handleData`;
        document.body.appendChild(script);
    }

    function handleData(data) {
        snackData.forEach(s => { 
            if(data[s.name.toUpperCase()] !== undefined) s.stock = parseInt(data[s.name.toUpperCase()]); 
        });
        document.getElementById('loading').style.display = 'none';
        render();
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const empty = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${empty ? 'is-empty' : ''}">
                    <div class="sold-out-overlay"><div class="sold-out-text">SOLD OUT</div></div>
                    <img src="${s.img}">
                    <div class="card-info">
                        <div class="card-name">${s.name}</div>
                        <div class="stock-tag">SISA: ${s.stock}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${empty ? 'disabled' : ''}>-</button>
                            <span id="qty-${s.id}" style="font-weight:900; min-width:25px;">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id},1)" ${empty ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = (cart[id] || 0) + delta;
        if(q < 0 || (delta > 0 && q > snackData[id].stock)) return;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => {
            if(cart[id] > 0) {
                total += cart[id] * 3;
                list.push(`${cart[id]}x ${snackData[id].name}`);
            }
        });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('summary').innerText = list.join(", ");
    }

    function openPayment() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("BOSKU, NAMA JANGAN KOSONG!");
        
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { 
            if(cart[id] > 0) {
                total += cart[id] * 3;
                list.push(`${cart[id]}x ${snackData[id].name}`);
            }
        });
        
        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; btn.disabled = true;

        const params = new URLSearchParams();
        params.append('nama', nama);
        params.append('pesanan', list.join(", "));
        params.append('total', "$" + total.toFixed(2));

        fetch(`${scriptURL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' })
        .then(() => { 
            alert("PESANAN BERHASIL!\nData masuk ke PENJUALAN & Stok otomatis terpotong."); 
            location.reload(); 
        })
        .catch(() => {
            alert("Selesai! Cek sheet lo.");
            location.reload();
        });
    }

    init();
</script>
</body>
</html>
