<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - SONGKRAN EDITION</title>
    <style>
        :root { 
            --cyan: #00ffff; --red: #ff0000; --dark: #0a0a0a; 
            --glass: rgba(10, 10, 10, 0.85); --neon-shadow: 0 0 15px var(--cyan); 
        }
        body { 
            font-family: 'Inter', sans-serif; margin: 0; background: var(--dark); color: white; 
            text-align: center; padding-bottom: 70px; overflow-x: hidden;
        }

        /* EFEK WATER SPLASH (SONGKRAN) */
        .splash {
            position: fixed; pointer-events: none; z-index: 100;
            border-radius: 50%; background: var(--cyan); opacity: 0.6;
            animation: splashAnim 1.5s ease-out forwards;
        }
        @keyframes splashAnim {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        header { 
            padding: 50px 20px; background: linear-gradient(180deg, rgba(0,255,255,0.1), transparent);
            border-bottom: 2px solid var(--cyan); position: relative;
        }
        .logo-header { width: 250px; filter: drop-shadow(var(--neon-shadow)); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .songkran-title {
            font-size: 2.5em; font-weight: 900; color: var(--cyan);
            text-shadow: 2px 2px var(--red); letter-spacing: 5px; margin: 10px 0;
        }

        /* GRID & CARD UPGRADE */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 900px; margin: 0 auto; }
        .card { 
            background: var(--glass); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(0, 255, 255, 0.2); transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: var(--neon-shadow); }
        .card img { width: 100%; height: 150px; object-fit: cover; }

        /* COMING SOON OVERLAY */
        .coming-soon-badge {
            position: absolute; top: 10px; right: 10px; background: var(--red);
            color: white; padding: 5px 12px; font-size: 0.6em; font-weight: 900;
            border-radius: 50px; box-shadow: 0 0 10px var(--red); z-index: 10;
        }

        .card-name { font-weight: 800; color: var(--cyan); padding: 10px 5px; font-size: 0.9em; }
        .stock-tag { font-size: 0.7em; color: #fff; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 5px; }

        /* COUNTER STYLING */
        .counter { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px; }
        .btn-qty { 
            background: transparent; border: 2px solid var(--cyan); color: var(--cyan);
            width: 35px; height: 35px; border-radius: 50%; font-weight: 900; cursor: pointer;
        }
        .btn-qty:hover { background: var(--cyan); color: black; }

        /* FLOATING TOTAL BAR */
        #total-bar { 
            position: fixed; bottom: 15px; left: 15px; right: 15px; 
            background: var(--cyan); color: black; padding: 15px 25px; 
            border-radius: 50px; display: none; justify-content: space-between; 
            align-items: center; z-index: 1000; box-shadow: var(--neon-shadow);
        }

        /* PAYMENT AREA */
        #payment-area { 
            display: none; padding: 40px 20px; background: #000; 
            border-top: 3px solid var(--cyan); margin-top: 30px;
        }
        .input-custom { 
            width: 90%; padding: 15px; background: transparent; 
            border: 2px solid var(--cyan); border-radius: 15px; color: white;
            font-weight: 700; text-align: center; margin-bottom: 20px;
        }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body onclick="createSplash(event)">

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <div class="songkran-title">SONGKRAN</div>
    <p style="color: var(--cyan); letter-spacing: 2px; font-weight: 700;">PROMO BASAH-BASAHAN • $3.00</p>
</header>

<div id="loading" style="padding: 100px; color: var(--cyan);">TUNGGU BENTAR, LAGI NGUMPULIN AIR...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div id="display-total" style="font-weight: 900; font-size: 1.2em;">$0.00</div>
    <button onclick="openPayment()" style="background:black; color:white; border:none; padding:10px 20px; border-radius:30px; font-weight:900;">BELI SEKARANG</button>
</div>

<div id="payment-area">
    <h2 style="color: var(--cyan);">KONFIRMASI PESANAN</h2>
    <input type="text" id="nama-pembeli" class="input-custom" placeholder="NAMA BOSKU SIAPA?">
    <div id="qr-area" style="margin: 20px 0;">
        <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg" style="width:200px; border:4px solid var(--cyan); border-radius:15px;">
    </div>
    <button id="submit-btn" onclick="sendToSpreadsheet()" style="width:90%; padding:20px; border-radius:50px; background:var(--cyan); border:none; font-weight:900; cursor:pointer;">KIRIM PESANAN (WHATSAPP)</button>
</div>

<script>
    const scriptURL = "LINK_APPS_SCRIPT_BARU_LO"; // GANTI PAKE LINK BARU NANTI

    function createSplash(e) {
        const s = document.createElement('div');
        s.className = 'splash';
        s.style.left = e.clientX + 'px';
        s.style.top = e.clientY + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1500);
    }

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" },
        { id: 9, name: "COMING SOON", stock: 0, img: "https://i.postimg.cc/x1yD1PBH/e5f0873b-c76b-4312-88bc-3bd67981a550.gif" }
    ];

    let cart = {};

    async function init() {
        try {
            const res = await fetch(scriptURL);
            const sheetStok = await res.json();
            snackData.forEach(s => { if(sheetStok[s.name] !== undefined) s.stock = sheetStok[s.name]; });
            document.getElementById('loading').style.display = 'none';
            render();
        } catch(e) { setTimeout(init, 3000); }
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const isComing = s.name === "COMING SOON";
            const empty = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${empty ? 'is-empty' : ''}">
                    ${isComing ? '<div class="coming-soon-badge">NEW DROP</div>' : ''}
                    <img src="${s.img}" style="${empty && !isComing ? 'filter:grayscale(1)' : ''}">
                    <div class="card-name">${s.name}</div>
                    <div class="stock-tag">${isComing ? 'STAY TUNED' : 'READY: ' + s.stock}</div>
                    <div class="counter">
                        <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${empty ? 'disabled' : ''}>-</button>
                        <span id="qty-${s.id}" style="font-weight:900;">0</span>
                        <button class="btn-qty" onclick="changeQty(${s.id},1)" ${empty ? 'disabled' : ''}>+</button>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = cart[id] || 0;
        if(delta > 0 && q >= snackData[id].stock) return;
        q += delta; if(q < 0) q = 0;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        Object.keys(cart).forEach(id => { if(cart[id]>0) total += cart[id]*3; });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
    }

    function openPayment() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("Masukan nama dulu, Bos!");
        
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { 
            if(cart[id]>0){ 
                total += cart[id]*3; 
                list.push(`${cart[id]}x ${snackData[id].name}`); 
            }
        });

        const btn = document.getElementById('submit-btn');
        btn.innerText = "SEDANG MENGIRIM..."; btn.disabled = true;

        const params = new URLSearchParams();
        params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
        params.append('total', "$" + total.toFixed(2));

        fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
        .then(() => { 
            alert("PESANAN BERHASIL DICATAT!"); 
            // AUTOMATIC WHATSAPP REDIRECT (CANGGIH!)
            const waMsg = `Halo Admin, Saya ${nama} mau order:\n${list.join("\n")}\nTotal: $${total.toFixed(2)}`;
            window.location.href = `https://wa.me/6281234567890?text=${encodeURIComponent(waMsg)}`; // GANTI NO WA LO
        });
    }

    init();
</script>
</body>
</html>
