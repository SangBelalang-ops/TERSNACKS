<!doctype html>
<html ⚡ lang="id">
<head>
  <meta charset="utf-8">
  <title>Warisan Nusantara - 5 Rasa Baru</title>
  <link rel="canonical" href="https://websitemu.com/amp-snack">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <meta name="theme-color" content="#212121"> <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style><noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  
  <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>
  <script async custom-element="amp-bind" src="https://cdn.ampproject.org/v0/amp-bind-0.1.js"></script>
  <script async custom-element="amp-animation" src="https://cdn.ampproject.org/v0/amp-animation-0.1.js"></script>

  <style amp-custom>
    /* Reset & Font */
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #212121; color: #fff; margin: 0; }
    
    /* Layout Utama */
    .hero { position: relative; height: 100vh; width: 100%; display: flex; flex-direction: column; overflow: hidden; transition: background 0.5s ease; } /* Transisi Warna BG */

    /* Header & Logo */
    header { padding: 20px; position: absolute; top: 0; width: 100%; z-index: 10; text-align: center; }
    .brand-logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #fff; }

    /* Carousel Gambar (The Star) */
    .product-carousel { flex: 1; display: flex; align-items: center; justify-content: center; }
    .slide-item { display: flex; align-items: center; justify-content: center; position: relative; }
    
    /* Frame Gambar yang menonjol keluar */
    .img-container { width: 80%; max-width: 400px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5)); transform: scale(1); transition: transform 0.3s ease; }
    
    /* Animasi saat slide aktif (di-trigger CSS) */
    [visible] .img-container { transform: scale(1.05); }

    /* Detail Teks Rasa */
    .product-details { padding: 20px; text-align: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); }
    .rasa-name { font-size: 1.5rem; font-weight: 700; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
    .rasa-desc { font-size: 0.9rem; font-weight: 300; opacity: 0.8; margin: 5px 0 20px 0; }

    /* Tombol CTA MANTAP (Sticky & Pulse) */
    .cta-container { position: fixed; bottom: 0; width: 100%; padding: 15px; box-sizing: border-box; display: flex; justify-content: center; z-index: 100; }
    .btn-buy { background: #fff; color: #000; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: pulse 2s infinite; }

    /* Keyframes Animasi Pulse */
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
      70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(255,255,255,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }
  </style>
</head>
<body>

  <amp-state id="productData">
    <script type="application/json">
      {
        "currentRasa": "WARISAN NUSANTARA",
        "currentDesc": "Koleksi 5 Rasa Baru yang Autentik",
        "currentBg": "#212121",
        "currentIndex": 0,
        "items": [
          { "name": "SUS KERING COKLAT", "desc": "Mewah & Creamy", "bg": "#3E2723" },
          { "name": "BALADO PADANG", "desc": "Berani & Pedas Bold", "bg": "#831010" },
          { "name": "KUE BAWANG", "desc": "Klasik & Gurih Warm", "bg": "#B38F00" },
          { "name": "UNTIR UNTIR", "desc": "Tradisional & Bertekstur", "bg": "#5D4037" },
          { "name": "BASRENG ORIGINAL", "desc": "Bersih & Nagih", "bg": "#607D8B" }
        ]
      }
    </script>
  </amp-state>

  <div class="hero" [style]="'background:' + productData.items[productData.currentIndex].bg">
    
    <header>
      <div class="brand-logo">WARISAN</div>
    </header>

    <amp-carousel class="product-carousel" width="100" height="100" layout="responsive" type="slides" autoplay delay="3000"
      on="slideChange:AMP.setState({ productData: {currentIndex: event.index}})">
      
      <div class="slide-item">
        <div class="img-container">
          <amp-img src="sus_coklat_transparant.png" width="400" height="400" layout="responsive"></amp-img>
        </div>
      </div>
      <div class="slide-item">
        <div class="img-container">
          <amp-img src="balado_transparant.png" width="400" height="400" layout="responsive"></amp-img>
        </div>
      </div>
      </amp-carousel>

    <div class="product-details">
      <h1 class="rasa-name" [text]="productData.items[productData.currentIndex].name">WARISAN NUSANTARA</h1>
      <p class="rasa-desc" [text]="productData.items[productData.currentIndex].desc">Koleksi 5 Rasa Baru yang Autentik</p>
    </div>

  </div>

  <div class="cta-container">
    <a href="https://websitemu.com/keranjang" class="btn-buy">Beli Sekarang</a>
  </div>

</body>
</html>
