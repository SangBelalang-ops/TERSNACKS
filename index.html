<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - PREMIUM SNACKS</title>
    <style>
        :root { 
            --primary: #f7941d; 
            --dark: #0a0a0a; 
            --glass: rgba(18, 18, 18, 0.85); 
            --aba: #005a8d; 
            --success: #27ae60; 
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); 
            background-attachment: fixed;
            color: white; text-align: center; padding-bottom: 120px; overflow-x: hidden; 
        }

        header { 
            padding: 40px 10px; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary); 
            position: relative; z-index: 10; 
        }
        
        /* Logo Header Diperbesar */
        .logo-header {
            width: 160px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(247, 148, 29, 0.6));
            margin-bottom: 10px;
        }

        /* Animasi Premium Quality - Efek Putih Sling Lewat */
        header p {
            margin: 0; font-size: 0.85em; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(to right, #f7941d 0%, #f7941d 40%, #ffffff 50%, #f7941d 60%, #f7941d 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: slingKilat 3s infinite linear;
        }
        @keyframes slingKilat {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; max-width: 800px; margin: 0 auto; }
        
        .card { 
            background: var(--glass); border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(247, 148, 29, 0.2); transition: 0.3s; position: relative;
        }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        
        /* Label Sold Out */
        .sold-out-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 140px;
            background: rgba(0,0,0,0.7); display: none; 
            align-items: center; justify-content: center; z-index: 5;
        }
        .sold-out-text {
            color: white; background: var(--danger); padding: 5px 15px;
            font-weight: 900; transform: rotate(-15deg); border: 2px solid white; font-size: 0.8em;
        }

        /* Logic Tampilan Sold Out */
        .is-empty .sold-out-overlay { display: flex; }
        .is-empty img { filter: grayscale(1); }

        .card-info { padding: 12px; }
        .card-name { font-size: 0.75em; font-weight: 800; margin-bottom: 5px; color: var(--primary); height: 30px; display: flex; align-items: center; justify-content: center; }
        .stock-tag { font-size: 0.65em; color: #aaa; margin-bottom: 8px; display: block; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-qty { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--primary); 
            width: 32px; height: 32px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold;
        }
        .btn-qty:active { background: var(--primary); color: black; }
        .btn-qty:disabled { opacity: 0.2; cursor: not-allowed; }

        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 18px 25px; display: none; justify-content: space-between; 
            align-items: center; z-index: 1000; border-top: 2px solid var(--primary); 
            border-radius: 20px 20px 0 0; 
        }
        .total-price { font-weight: 900; font-size: 1.4em; color: var(--primary); }
        .btn-order { background: var(--primary); color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; cursor: pointer; }

        #payment-area { display:none; padding: 40px 20px; background: rgba(0,0,0,0.9); border-top: 2px solid var(--primary); margin-top: 30px; }
        .input-nama { width: 80%; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); background: transparent; margin-bottom: 20px; color: white; text-align: center; font-weight: bold; }
        .pay-options { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .pay-btn { padding: 12px 25px; border: 2px solid var(--aba); border-radius: 12px; background: transparent; color: white; cursor: pointer; font-weight: bold; }
        .pay-btn.active { background: var(--aba); border-color: white; }
        .qr-box { display: none; margin-top: 25px; }
        .qr-box img { width: 260px; border: 8px solid white; border-radius: 20px; }
        .final-btn { background: var(--success); color: white; padding: 18px 40px; border: none; border-radius: 50px; font-weight: 900; margin-top: 30px; width: 85%; cursor: pointer; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header" alt="Logo TERSNACKS">
    <div class="header-text">
        <h2 style="margin:5px 0 0; font-size: 1.4em; font-weight: 900; letter-spacing: 2px;">TERSNACKS.ID</h2>
        <p>PREMIUM QUALITY • $3.00</p>
    </div>
</header>

<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div class="total-info" style="text-align:left;">
        <div id="summary" style="font-size: 0.7em; color: #ccc;">Pilih snack...</div>
        <div class="total-price" id="display-total">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
</div>

<div id="payment-area">
    <h3 style="color: var(--primary);">DATA PEMBELI</h3>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="Masukkan Nama Anda..." required>
    
    <h3>METODE PEMBAYARAN</h3>
    <div class="pay-options">
        <button class="pay-btn" onclick="showQR('usd', this)">USD ($)</button>
        <button class="pay-btn" onclick="showQR('riel', this)">RIEL (៛)</button>
    </div>

    <div id="qr-usd" class="qr-box">
        <p>Scan ABA (USD):</p>
        <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg">
    </div>

    <div id="qr-riel" class="qr-box">
        <p>Scan ABA (RIEL):</p>
        <img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg">
    </div>

    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
</div>

<script>
    // DATA STOK TERBARU (Update Sesuai List Kamu)
    const snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 15, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 9, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 10, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 10, img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
        { id: 4, name: "MAKARONI", stock: 24, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 31, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 20, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 7, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 26, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    function init() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const isSoldOut = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${isSoldOut ? 'is-empty' : ''}">
                    <div class="sold-out-overlay"><div class="sold-out-text">SOLD OUT</div></div>
                    <img src="${s.img}">
                    <div class="card-info">
                        <div class="card-name">${s.name}</div>
                        <span class="stock-tag">Stok: ${s.stock}</span>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id}, -1)" ${isSoldOut ? 'disabled' : ''}>-</button>
                            <span class="qty-val" id="qty-${s.id}">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id}, 1)" ${isSoldOut ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function changeQty(id, delta) {
        let currentQty = cart[id] || 0;
        if (delta > 0 && currentQty >= snackData[id].stock) {
            alert("Maaf Bos, Stok Terbatas!");
            return;
        }
        let newQty = currentQty + delta;
        if(newQty < 0) newQty = 0;
        cart[id] = newQty;
        document.getElementById(`qty-${id}`).innerText = newQty;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => {
            if(cart[id] > 0) {
                total += cart[id] * 3.0;
                list.push(`${cart[id]}x ${snackData[id].name}`);
            }
        });
        const bar = document.getElementById('total-bar');
        if(total > 0) {
            bar.style.display = 'flex';
            document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('summary').innerText = list.join(", ");
        } else { bar.style.display = 'none'; }
    }

    function openPayment() {
        const pay = document.getElementById('payment-area');
        pay.style.display = 'block';
        pay.scrollIntoView({ behavior: 'smooth' });
    }

    function showQR(type, btn) {
        document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
        document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
        document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) { alert("Isi nama dulu Bos!"); return; }
        alert("MANTAP! Pesanan sedang diproses.");
        location.reload();
    }

    init();
</script>
</body>
</html>
