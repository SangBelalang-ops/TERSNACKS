<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - PREMIUM QUALITY</title>
    <style>
        :root { --primary: #f7941d; --glass: rgba(18, 18, 18, 0.9); --aba: #005a8d; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: white; text-align: center; padding-bottom: 50px; overflow-x: hidden; }
        .falling-snack { position: fixed; top: -50px; font-size: 28px; z-index: 100; user-select: none; pointer-events: none; animation: fall linear forwards; filter: drop-shadow(0 0 5px white); color: #fff; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        header { position: relative; z-index: 10; padding: 45px 10px; background: var(--glass); border-bottom: 2px solid var(--primary); }
        .logo-header { width: 280px; filter: drop-shadow(0 0 15px var(--primary)); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid rgba(247,148,29,0.2); position: relative; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .sold-out-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 130px; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 5; }
        .sold-out-text { color: white; background: var(--danger); padding: 5px 10px; font-weight: 900; transform: rotate(-15deg); border: 2px solid white; font-size: 0.7em; }
        .is-empty .sold-out-overlay { display: flex; }
        .is-empty img { filter: grayscale(1); }
        .card-info { padding: 10px; }
        .card-name { font-size: 0.75em; font-weight: 800; color: var(--primary); height: 35px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .stock-tag { font-size: 0.65em; color: var(--primary); background: rgba(247, 148, 29, 0.2); border-radius: 5px; padding: 2px 8px; font-weight: 900; border: 1px solid rgba(247, 148, 29, 0.4); display: inline-block; margin-bottom: 10px; }
        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-qty { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); width: 30px; height: 30px; border-radius: 8px; color: white; cursor: pointer; }
        #total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 18px 25px; display: none; justify-content: space-between; align-items: center; border-top: 2px solid var(--primary); z-index: 1000; backdrop-filter: blur(10px); border-radius: 20px 20px 0 0; }
        .btn-order { background: var(--primary); color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        #payment-area { display:none; padding: 40px 20px; background: rgba(0,0,0,0.95); border-top: 2px solid var(--primary); }
        .input-nama { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); background: transparent; color: white; text-align: center; font-weight: 800; margin-bottom: 20px; }
        .qr-box { display: none; margin: 25px 0; }
        .qr-box img { width: 220px; border: 5px solid white; border-radius: 15px; }
        .final-btn { background: var(--success); color: white; padding: 18px; border: none; border-radius: 50px; font-weight: 900; width: 90%; cursor: pointer; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <p style="color:var(--primary); font-weight:800; letter-spacing: 2px;">PREMIUM QUALITY • $3.00</p>
</header>

<div id="loading" style="padding: 50px; color: var(--primary); font-weight: 800;">MENYIAPKAN SNACK...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div style="text-align:left">
        <div id="summary" style="font-size: 0.65em; color: #ccc;"></div>
        <div id="display-total" style="font-weight: 900; color: var(--primary); font-size: 1.4em;">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
</div>

<div id="payment-area">
    <h3 style="color: var(--primary); font-weight: 900;">DATA PEMBELI</h3>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="SIAPA NAMA ANDA?">
    <div style="margin: 20px 0;">
        <button onclick="showQR('usd')" style="padding:10px; border:1px solid var(--primary); background:none; color:white; border-radius:10px; font-weight: 800; margin: 5px;">USD ($)</button>
        <button onclick="showQR('riel')" style="padding:10px; border:1px solid var(--primary); background:none; color:white; border-radius:10px; font-weight: 800; margin: 5px;">RIEL (៛)</button>
    </div>
    <div id="qr-usd" class="qr-box"><img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg"></div>
    <div id="qr-riel" class="qr-box"><img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg"></div>
    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI & KIRIM</button>
</div>

<script>
    // PASTIKAN LINK INI BENER-BENER YANG TERBARU
    const scriptURL = "https://script.google.com/macros/s/AKfycbxSEZRcBGjY6TOMCqWgubq-L_qRPY4DxSVs9z92Wie_KOAMIsU5TAfoedRNbdTsgBRw/exec";

    function createSnack() {
        const icons = ['🥨', '🍪', '🍬', '🥜', '🍿'];
        const snack = document.createElement('div');
        snack.className = 'falling-snack';
        snack.innerText = icons[Math.floor(Math.random() * icons.length)];
        snack.style.left = Math.random() * 100 + 'vw';
        snack.style.animationDuration = Math.random() * 3 + 2 + 's';
        document.body.appendChild(snack);
        setTimeout(() => snack.remove(), 5000);
    }
    setInterval(createSnack, 300);

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    // VERSI BARU: Pake teknik "no-cors" dan "Redirect"
    async function init() {
        console.log("Memulai koneksi ke Google...");
        try {
            const response = await fetch(scriptURL);
            if (!response.ok) throw new Error('Network response was not ok');
            const sheetStok = await response.json();
            console.log("Data diterima:", sheetStok);
            
            snackData.forEach(s => { 
                if(sheetStok[s.name] !== undefined) s.stock = sheetStok[s.name]; 
            });
            document.getElementById('loading').style.display = 'none';
            render();
        } catch(e) { 
            console.error("Gagal narik stok:", e);
            // Kalau gagal narik stok, kita tampilin aja stok default (0) biar web gak stuck di loading
            document.getElementById('loading').innerHTML = "Koneksi Lemot... Klik <a href='#' onclick='location.reload()' style='color:white'>Sini</a> buat Refresh";
        }
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const empty = s.stock <= 0;
            grid.innerHTML += `<div class="card ${empty ? 'is-empty' : ''}">
                <div class="sold-out-overlay"><div class="sold-out-text">SOLD OUT</div></div>
                <img src="${s.img}">
                <div class="card-info">
                    <div class="card-name">${s.name}</div>
                    <div class="stock-tag">SISA: ${s.stock}</div>
                    <div class="counter">
                        <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${empty?'disabled':''}>-</button>
                        <span id="qty-${s.id}" style="font-weight:900; min-width:20px;">0</span>
                        <button class="btn-qty" onclick="changeQty(${s.id},1)" ${empty?'disabled':''}>+</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = cart[id] || 0;
        if(delta > 0 && q >= snackData[id].stock) return;
        q += delta; if(q < 0) q = 0;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => { if(cart[id]>0){ total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }});
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('summary').innerText = list.join(", ");
    }

    function openPayment() { document.getElementById('payment-area').style.display='block'; window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); }
    function showQR(t) { document.getElementById('qr-usd').style.display = t=='usd'?'block':'none'; document.getElementById('qr-riel').style.display = t=='riel'?'block':'none'; }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("Siapa Nama Bosku?");
        
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { if(cart[id]>0){ total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }});
        
        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; 
        btn.disabled = true;

        // Kirim pake format URLSearchParams (paling stabil buat Google Apps Script)
        const finalURL = `${scriptURL}?pesanan=${encodeURIComponent('Pembeli: ' + nama + ' | Order: ' + list.join(", "))}&total=${encodeURIComponent('$' + total.toFixed(2))}`;

        fetch(finalURL, { method: 'POST', mode: 'no-cors' })
        .then(() => { 
            alert("MANTAP! Pesanan Berhasil Terkirim."); 
            location.reload(); 
        })
        .catch(err => {
            console.error(err);
            alert("Ada masalah koneksi, tapi pesanan biasanya tetap masuk. Cek Sheet lo ya!");
            location.reload();
        });
    }
    
    // Panggil init
    init();
</script>
</body>
</html>
