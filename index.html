<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS - Premium Checkout</title>
    <style>
        :root { --primary: #f7941d; --dark: #1a1a1a; --aba: #005a8d; --success: #27ae60; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background-color: #f9f9f9;
            color: var(--dark); 
            text-align: center; 
            padding-bottom: 120px; 
            overflow-x: hidden;
            /* LOGO SEBAGAI BACKGROUND UTAMA */
            background-image: url('https://i.postimg.cc/bvQNX9PS/d86aa452-3ea3-4a45-8dd4-5fd3ba61f3b1.jpg');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: 70% auto;
        }

        /* Overlay transparan biar logo gak terlalu kontras tapi tetep keliatan */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); /* Transparansi background */
            z-index: -1;
        }

        /* HEADER BAR (LOGO KIRI, TEKS KANAN) */
        header { 
            padding: 15px 20px; 
            background: rgba(255, 255, 255, 0.95); 
            border-bottom: 2px solid var(--primary); 
            display: flex; align-items: center; justify-content: flex-start; gap: 15px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .logo-header { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #ddd; }
        .header-text { text-align: left; }
        .header-text h2 { margin: 0; font-size: 1.1em; letter-spacing: 1px; color: var(--dark); }
        .header-text p { margin: 0; font-size: 0.65em; font-weight: bold; color: var(--primary); }

        /* GRID PRODUK TRANSPARAN */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            padding: 15px; max-width: 800px; margin: 0 auto; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.4); /* SANGAT TRANSPARAN */
            backdrop-filter: blur(3px); /* Efek blur dikit biar teks kebaca */
            border-radius: 12px; overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.95); }
        
        .card img { width: 100%; height: 120px; object-fit: cover; opacity: 0.9; }
        .card-info { padding: 8px; }
        .card-name { font-size: 0.65em; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; height: 25px; display: flex; align-items: center; justify-content: center; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn-qty { background: white; border: 1px solid #ccc; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8em; }

        /* TOTAL BAR & PAYMENT */
        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(10px);
            color: white; padding: 15px 20px; display: none; 
            justify-content: space-between; align-items: center; z-index: 1000; 
        }
        .total-price { font-weight: 900; font-size: 1.1em; color: var(--primary); }
        .btn-order { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #payment-area { display:none; padding: 30px 20px; background: rgba(255, 255, 255, 0.95); border-top: 3px solid var(--primary); }
        .input-nama { width: 85%; padding: 12px; border-radius: 8px; border: 2px solid var(--primary); margin-bottom: 15px; font-size: 1em; text-align: center; font-weight: bold; }
        
        .pay-options { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .pay-btn { padding: 10px 15px; border: 1px solid var(--aba); border-radius: 8px; background: white; font-size: 0.8em; font-weight: bold; cursor: pointer; }
        .pay-btn.active { background: var(--aba); color: white; }
        .qr-box img { width: 220px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .final-btn { background: var(--success); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 90%; cursor: pointer; margin-top: 20px; }

        /* Animasi Makaroni */
        .macaroni { position: fixed; top: -50px; font-size: 20px; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/bvQNX9PS/d86aa452-3ea3-4a45-8dd4-5fd3ba61f3b1.jpg" class="logo-header">
        <div class="header-text">
            <h2>TERSNACKS</h2>
            <p>PREMIUM SNACK • $2.50 / PACK</p>
        </div>
    </header>

    <div class="grid" id="container-snack"></div>

    <div id="total-bar">
        <div style="text-align:left;">
            <div id="summary" style="font-size: 0.55em; opacity: 0.8;">Pilih snack favoritmu...</div>
            <div class="total-price" id="display-total">$0.00</div>
        </div>
        <button class="btn-order" onclick="openPayment()">LANJUT ORDER</button>
    </div>

    <div id="payment-area">
        <h3>MASUKKAN NAMA</h3>
        <input type="text" id="nama-pembeli" class="input-nama" placeholder="CONTOH: ALVIN">
        
        <p style="font-size: 0.8em; font-weight: bold;">METODE PEMBAYARAN (ABA):</p>
        <div class="pay-options">
            <button class="pay-btn" onclick="showQR('usd', this)">BAYAR USD</button>
            <button class="pay-btn" onclick="showQR('riel', this)">BAYAR RIEL</button>
        </div>

        <div id="qr-usd" class="qr-box" style="display:none;">
            <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg">
        </div>
        <div id="qr-riel" class="qr-box" style="display:none;">
            <img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg">
        </div>

        <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI SEKARANG</button>
    </div>

    <audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

    <script>
        const snackData = [
            { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 3, name: "MIE LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = {};

        function createMacaroni() {
            const m = document.createElement('div');
            m.className = 'macaroni'; m.innerText = '🍤';
            m.style.left = Math.random() * 100 + 'vw';
            m.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 5000);
        }
        setInterval(createMacaroni, 600);

        function init() {
            const grid = document.getElementById('container-snack');
            snackData.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.img}">
                        <div class="card-info">
                            <div class="card-name">${s.name}</div>
                            <div class="counter">
                                <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                                <span class="qty-val" id="qty-${s.id}">0</span>
                                <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0; let list = [];
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    total += cart[id] * 2.5;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });
            const bar = document.getElementById('total-bar');
            if(total > 0) {
                bar.style.display = 'flex';
                document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('summary').innerText = list.join(", ");
            } else { bar.style.display = 'none'; }
        }

        function openPayment() {
            document.getElementById('bgMusic').play();
            const pay = document.getElementById('payment-area');
            pay.style.display = 'block';
            pay.scrollIntoView({ behavior: 'smooth' });
        }

        function showQR(type, btn) {
            document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
            document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToSpreadsheet() {
            const nama = document.getElementById('nama-pembeli').value;
            if(!nama) { alert("Namanya siapa, Bos?"); return; }

            let list = []; let totalUSD = 0;
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    totalUSD += cart[id] * 2.5;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });

            const btn = document.getElementById('submit-btn');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;

            const scriptURL = "https://script.google.com/macros/s/AKfycby-koR4z1YFZYSs3XPAkrGMdpBcN7tqx_1i1JAf4W5vo9Ka-0w8NjYrMFXHIytVZ6FY/exec";
            
            const params = new URLSearchParams();
            params.append('pembeli', nama);
            params.append('pesanan', list.join(", "));
            params.append('total', "$" + totalUSD.toFixed(2));

            fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
            .then(() => {
                alert("PESANAN BERHASIL TERKIRIM!");
                location.reload();
            })
            .catch(() => {
                alert("TERKIRIM!");
                location.reload();
            });
        }
        init();
    </script>
</body>
</html>
